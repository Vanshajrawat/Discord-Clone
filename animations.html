<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

	<style>
		.boxAnimation{
			animation: 20s infinite linear moveBox;
		}

		@keyframes moveBox{
			0%{
				top:0%;
				right:0%;
			}
			50%{
				top:50%;
				right:100%;
			}
			75%{
				top:75%;
				left:0%;
			}
			100%{
				top:100%;
				left:100%;
			}
			/* 50%{
				right:50%;
				top:50%;
			}
			75%{
				right:75%;
				top:50%;
			}
			100%{
				right:10%;
				top:100%;
			} */
		}
	</style>

</head>
<body>
	
	<div class="bg-black h-250 flex ">

		<img src="./images/upside-down-box.webp" 
		loading="lazy"
		alt=""
		width="200px"
		class="absolute boxAnimation">



	</div>






</body>
</html>
